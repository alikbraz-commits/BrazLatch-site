<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — BrazLatch</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .thanks{
      min-height: 90vh; display:flex; align-items:center;
      background: linear-gradient(180deg, #f6f8f6 0%, #ffffff 100%);
    }
    .thanks .card{
      max-width: 640px; margin: 0 auto; text-align:center;
      background: #fff; border:1px solid var(--line);
      border-radius: var(--radius-lg); padding: 56px 36px;
      box-shadow: var(--shadow-md);
    }
    .thanks .icon{
      width: 72px; height:72px; border-radius:50%;
      background: var(--green); margin: 0 auto 18px;
      display:flex; align-items:center; justify-content:center;
    }
    .thanks h1{ font-size: clamp(28px, 4vw, 40px); margin: 0 0 12px; }
    .thanks p{ color: var(--muted); margin: 0 0 24px; }
  </style>
</head>
<body>
  <header class="site-header is-scrolled" id="siteHeader">
    <div class="container header-inner">
      <a href="/" class="logo"><img src="/assets/img/logo.svg" alt="braz innovation" width="160" height="86" /></a>
    </div>
  </header>
  <main>
    <section class="thanks">
      <div class="container">
        <div class="card">
          <div class="icon" aria-hidden="true">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <h1>Thank you.</h1>
          <p>Your distributor enquiry is on its way to Alik. We reply personally within five working days — usually faster.</p>
          <a href="/" class="btn btn-primary">Back to BrazLatch.com</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
